services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: recruiting_os
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    volumes:
      - rto-production-like-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME} -d recruiting_os"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - rto-production-like-minio:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      RTO_OBJECT_STORAGE_BUCKET: ${RTO_OBJECT_STORAGE_BUCKET}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          sleep 2
        done
        mc mb --ignore-existing "local/$$RTO_OBJECT_STORAGE_BUCKET"

  core-api:
    build:
      context: ../..
      dockerfile: services/core-api/Dockerfile
    env_file:
      - ../deployment/production-like.env.example
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/recruiting_os
      RTO_DOCUMENT_STORAGE_ROOT_DIR: /var/lib/rto/documents
      RTO_OBJECT_STORAGE_LOCAL_ROOT_DIR: /var/lib/rto/documents
    volumes:
      - rto-production-like-documents:/var/lib/rto/documents
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "${CORE_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    environment:
      CORE_API_INTERNAL_URL: http://core-api:8080
    depends_on:
      core-api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8088}:80"

volumes:
  rto-production-like-postgres:
  rto-production-like-minio:
  rto-production-like-documents:
