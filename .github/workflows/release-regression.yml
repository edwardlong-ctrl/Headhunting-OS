name: release-regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_pilot_e2e:
        description: "Run the browser pilot E2E job against an isolated CI PostgreSQL service"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
      - run: npm ci
      - run: npm run test:core-api

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
      - run: npm ci
      - run: npm --workspace @rto/web run test
      - run: npm run typecheck:web
      - run: npm run build:web

  release-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
      - run: npm ci
      - run: npm run release:migrations
      - run: npm run release:privacy-security
      - run: npm run release:ai-eval

  pilot-browser-e2e:
    if: github.event_name == 'workflow_dispatch' && inputs.run_pilot_e2e == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: recruiting_os
          POSTGRES_USER: recruiting_os
          POSTGRES_PASSWORD: recruiting_os_local_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recruiting_os -d recruiting_os"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run release:e2e:pilot
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/recruiting_os
          SPRING_DATASOURCE_USERNAME: recruiting_os
          SPRING_DATASOURCE_PASSWORD: recruiting_os_local_password
