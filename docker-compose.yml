services:
  postgres:
    image: postgres:16-alpine
    container_name: rto-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recruiting_os}
      POSTGRES_USER: ${POSTGRES_USER:-recruiting_os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recruiting_os_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - rto-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recruiting_os} -d ${POSTGRES_DB:-recruiting_os}"]
      interval: 10s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio:latest
    container_name: rto-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rto-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rto-postgres-data:
  rto-minio-data:
