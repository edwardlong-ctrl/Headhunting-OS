spring:
  application:
    name: recruiting-transaction-core-api
  flyway:
    enabled: ${CORE_API_FLYWAY_ENABLED:false}
    locations: classpath:db/migration

server:
  port: ${CORE_API_PORT:8080}

rto:
  auth:
    jwt:
      issuer: ${RTO_AUTH_JWT_ISSUER:recruiting-transaction-os}
      secret: ${RTO_AUTH_JWT_SECRET:}
      access-token-ttl-seconds: ${RTO_AUTH_ACCESS_TOKEN_TTL_SECONDS:1800}
      refresh-token-ttl-seconds: ${RTO_AUTH_REFRESH_TOKEN_TTL_SECONDS:604800}
  document-storage:
    root-dir: ${RTO_DOCUMENT_STORAGE_ROOT_DIR:}
