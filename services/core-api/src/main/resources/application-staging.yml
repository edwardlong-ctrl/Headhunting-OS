spring:
  config:
    activate:
      on-profile: staging
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  flyway:
    enabled: ${CORE_API_FLYWAY_ENABLED:true}

rto:
  auth:
    jwt:
      issuer: ${RTO_AUTH_JWT_ISSUER:recruiting-transaction-os}
      secret: ${RTO_AUTH_JWT_SECRET}
  document-storage:
    root-dir: ${RTO_DOCUMENT_STORAGE_ROOT_DIR}
    virus-scan:
      mode: ${RTO_DOCUMENT_STORAGE_VIRUS_SCAN_MODE:noop}
  ai:
    deepseek:
      api-key: ${RTO_AI_DEEPSEEK_API_KEY}
    routes:
      default:
        provider: ${RTO_AI_ROUTE_DEFAULT_PROVIDER:deepseek}
        model: ${RTO_AI_ROUTE_DEFAULT_MODEL:deepseek-v4-pro}
      candidate-profile-parser:
        provider: ${RTO_AI_ROUTE_CANDIDATE_PROFILE_PROVIDER:deepseek}
        model: ${RTO_AI_ROUTE_CANDIDATE_PROFILE_MODEL:deepseek-v4-pro}
      authenticity-risk-assessor:
        provider: ${RTO_AI_ROUTE_AUTHENTICITY_PROVIDER:deepseek}
        model: ${RTO_AI_ROUTE_AUTHENTICITY_MODEL:deepseek-v4-pro}
      interview-feedback-structurer:
        provider: ${RTO_AI_ROUTE_INTERVIEW_FEEDBACK_PROVIDER:deepseek}
        model: ${RTO_AI_ROUTE_INTERVIEW_FEEDBACK_MODEL:deepseek-v4-pro}
  deployment:
    frontend-origin: ${RTO_FRONTEND_ORIGIN}
    public-base-url: ${RTO_PUBLIC_BASE_URL}
    database:
      managed: ${RTO_DEPLOYMENT_DATABASE_MANAGED:false}
    object-storage:
      provider: ${RTO_OBJECT_STORAGE_PROVIDER:local-filesystem}
      bucket: ${RTO_OBJECT_STORAGE_BUCKET:}
      endpoint: ${RTO_OBJECT_STORAGE_ENDPOINT:}
      local-root-dir: ${RTO_OBJECT_STORAGE_LOCAL_ROOT_DIR:${RTO_DOCUMENT_STORAGE_ROOT_DIR}}
      access-key: ${RTO_OBJECT_STORAGE_ACCESS_KEY:}
      secret-key: ${RTO_OBJECT_STORAGE_SECRET_KEY:}

logging:
  pattern:
    console: "ts=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%p service=core-api requestId=%X{requestId:-none} organizationId=%X{organizationId:-unknown} actorRole=%X{actorRole:-unknown} errorCode=%X{errorCode:-none} logger=%logger{36} msg=%replace(%m){'[\r\n]','_'}%n"
